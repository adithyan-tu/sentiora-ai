services:
  backend:
    build:
      context: ./backend

    container_name: sentiora_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

    volumes:
      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:16

    container_name: sentiora_postgres

    environment:
      POSTGRES_USER: sentiora
      POSTGRES_PASSWORD: sentiora_password
      POSTGRES_DB: sentiora_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
